<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" fill="none">
  <!-- Background -->
  <rect width="800" height="800" fill="#F5F5F5"/>
  
  <!-- Lightbulb base -->
  <g id="lightbulb">
    <!-- Bulb shape -->
    <ellipse cx="400" cy="300" rx="120" ry="140" fill="#FFFFFF" stroke="#0E0E0E" stroke-width="6"/>
    
    <!-- Filament inside -->
    <path d="M 380 280 Q 400 250 420 280" stroke="#DA291C" stroke-width="8" fill="none"/>
    <path d="M 380 320 Q 400 290 420 320" stroke="#DA291C" stroke-width="8" fill="none"/>
    
    <!-- Base/socket -->
    <rect x="360" y="430" width="80" height="30" fill="#0E0E0E"/>
    <rect x="360" y="460" width="80" height="30" fill="#DA291C"/>
    <rect x="360" y="490" width="80" height="30" fill="#0E0E0E"/>
  </g>
  
  <!-- Radiating lines (epiphany) -->
  <g id="rays" stroke="#DA291C" stroke-width="6">
    <line x1="400" y1="150" x2="400" y2="80"/>
    <line x1="520" y1="180" x2="570" y2="130"/>
    <line x1="570" y1="300" x2="640" y2="300"/>
    <line x1="520" y1="420" x2="570" y2="470"/>
    <line x1="280" y1="180" x2="230" y2="130"/>
    <line x1="230" y1="300" x2="160" y2="300"/>
    <line x1="280" y1="420" x2="230" y2="470"/>
  </g>
  
  <!-- Exclamation mark -->
  <g id="exclamation">
    <rect x="385" y="580" width="30" height="100" fill="#DA291C"/>
    <circle cx="400" cy="700" r="20" fill="#DA291C"/>
  </g>
  
  <!-- Text label -->
  <text x="400" y="760" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#0E0E0E" text-anchor="middle">REALIZE</text>
</svg>
