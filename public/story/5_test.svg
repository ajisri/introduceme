<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" fill="none">
  <!-- Background -->
  <rect width="800" height="800" fill="#F5F5F5"/>
  
  <!-- Crossroads - Geometric paths -->
  <g id="paths">
    <!-- Vertical path -->
    <rect x="350" y="0" width="100" height="800" fill="#DA291C"/>
    
    <!-- Horizontal path -->
    <rect x="0" y="350" width="800" height="100" fill="#0E0E0E"/>
    
    <!-- Center intersection highlight -->
    <rect x="350" y="350" width="100" height="100" fill="#DA291C"/>
  </g>
  
  <!-- Decision arrows -->
  <g id="arrows">
    <!-- Up arrow -->
    <polygon points="400,150 350,250 450,250" fill="#0E0E0E"/>
    
    <!-- Right arrow -->
    <polygon points="650,400 550,350 550,450" fill="#DA291C"/>
    
    <!-- Down arrow -->
    <polygon points="400,650 450,550 350,550" fill="#0E0E0E"/>
    
    <!-- Left arrow -->
    <polygon points="150,400 250,450 250,350" fill="#DA291C"/>
  </g>
  
  <!-- Central figure (person at crossroads) -->
  <g id="figure">
    <!-- Head -->
    <circle cx="400" cy="380" r="25" fill="#FFFFFF" stroke="#0E0E0E" stroke-width="4"/>
    
    <!-- Body -->
    <rect x="385" y="405" width="30" height="50" fill="#FFFFFF" stroke="#0E0E0E" stroke-width="4"/>
    
    <!-- Question mark above head -->
    <text x="400" y="320" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#DA291C" text-anchor="middle">?</text>
  </g>
  
  <!-- Text label -->
  <text x="400" y="750" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#0E0E0E" text-anchor="middle">TEST</text>
</svg>
